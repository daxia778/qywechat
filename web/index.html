<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="单管家 - 订单协同管理平台" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <title>单管家</title>
    <style>
      /* Instant loading shell — rendered before any JS loads.
         React.createRoot() replaces #root children automatically. */
      body { margin: 0; background: #FAFAFB; }
      .app-shell-skeleton {
        display: flex; height: 100vh; overflow: hidden;
      }
      .skeleton-sidebar {
        width: 80px; background: #1E1B4B;
        display: flex; flex-direction: column; align-items: center;
        padding-top: 20px; gap: 24px; flex-shrink: 0;
      }
      .skeleton-sidebar .logo-dot {
        width: 40px; height: 40px; border-radius: 12px;
        background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      }
      .skeleton-sidebar .nav-dot {
        width: 28px; height: 28px; border-radius: 8px;
        background: rgba(255,255,255,0.08);
      }
      .skeleton-main {
        flex: 1; display: flex; flex-direction: column;
      }
      .skeleton-header {
        height: 72px; background: #fff; border-bottom: 2px solid #E5E7EB;
        flex-shrink: 0;
      }
      .skeleton-content {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
      }
      .skeleton-spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid #E5E7EB; border-top-color: #434FCF;
        animation: sk-spin 0.6s linear infinite;
      }
      .skeleton-text {
        color: #94A3B8; font-size: 13px; font-weight: 500;
        font-family: Inter, system-ui, sans-serif;
      }
      @keyframes sk-spin { to { transform: rotate(360deg); } }
      @media (min-width: 1024px) {
        .skeleton-sidebar { width: 80px; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading skeleton: visible until React mounts -->
      <div class="app-shell-skeleton">
        <div class="skeleton-sidebar">
          <div class="logo-dot"></div>
          <div class="nav-dot"></div>
          <div class="nav-dot"></div>
          <div class="nav-dot"></div>
          <div class="nav-dot"></div>
          <div class="nav-dot"></div>
        </div>
        <div class="skeleton-main">
          <div class="skeleton-header"></div>
          <div class="skeleton-content">
            <div class="skeleton-spinner"></div>
            <div class="skeleton-text">加载中...</div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
