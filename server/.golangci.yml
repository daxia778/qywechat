run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - exportloopref
    - gocritic
    - misspell
  disable:
    - deadcode
    - varcheck
    - structcheck

linters-settings:
  gosec:
    excludes:
      - G104  # 不检查未处理的错误（太多误报）

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 5
