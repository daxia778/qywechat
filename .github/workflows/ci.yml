name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ─── 后端 (Go) ─────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags="-s -w" -o pdd-server .

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: server

      - name: Security scan (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G104,G115,G304,G404,G401,G112 -exclude-dir=middleware/wxbizmsgcrypt.go ./...

      - name: Test with coverage
        env:
          CGO_ENABLED: '0'
        run: |
          go test ./... -v -count=1 -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -1

  # ─── 前端 (React/Vite) ─────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─── Release 构建 (仅 tag 触发) ─────────────
  release:
    name: Build Release Artifacts
    needs: [backend, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Build Linux AMD64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o ../pdd-server-linux-amd64 .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-web/package-lock.json

      - name: Build Frontend
        working-directory: admin-web
        run: |
          npm ci
          npm run build

      - name: Package frontend
        run: tar -czf admin-web-dist.tar.gz -C admin-web/dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pdd-server-linux-amd64
            admin-web-dist.tar.gz
