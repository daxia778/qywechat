name: Build Desktop Client

on:
  push:
    branches: [main]
    paths:
      - 'desktop-client/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch: # 手动触发

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ─── Windows ───
          - name: Windows-amd64
            os: windows-latest
            platform: windows/amd64
            artifact: pdd-dispatch-windows-amd64
            ext: .exe
            tags: ""
          - name: Windows-arm64
            os: windows-latest
            platform: windows/arm64
            artifact: pdd-dispatch-windows-arm64
            ext: .exe
            tags: ""

          # ─── macOS ───
          - name: macOS-arm64-AppleSilicon
            os: macos-latest
            platform: darwin/arm64
            artifact: pdd-dispatch-macos-arm64
            ext: .app
            tags: ""
          - name: macOS-amd64-Intel
            os: macos-latest
            platform: darwin/amd64
            artifact: pdd-dispatch-macos-amd64
            ext: .app
            tags: ""

          # ─── Linux ───
          - name: Linux-amd64
            os: ubuntu-latest
            platform: linux/amd64
            artifact: pdd-dispatch-linux-amd64
            ext: ""
            tags: webkit2_41

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: desktop-client/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Linux 需要 GTK/WebKit 依赖（Ubuntu 24.04 用 4.1）
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (with tags)
        if: matrix.tags != ''
        working-directory: desktop-client
        run: wails build -platform ${{ matrix.platform }} -tags ${{ matrix.tags }}

      - name: Build (without tags)
        if: matrix.tags == ''
        working-directory: desktop-client
        run: wails build -platform ${{ matrix.platform }}

      # Windows: 上传 .exe
      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop-client/build/bin/*.exe
          retention-days: 90

      # macOS: 上传 .app 目录
      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop-client/build/bin/*.app
          retention-days: 90

      # Linux: 上传二进制
      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop-client/build/bin/pdd-dispatch*
          retention-days: 90
