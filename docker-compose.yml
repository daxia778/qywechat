version: '3.8'

services:
  # ── PostgreSQL 数据库 ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdd_order
      POSTGRES_USER: pdd
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # 不暴露数据库端口到宿主机，仅通过 Docker 内部网络访问
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdd -d pdd_order"]
      interval: 5s
      retries: 5

  # ── PDD 后端服务 ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: pdd
      PG_PASSWORD: ${PG_PASSWORD:-changeme}
      PG_DBNAME: pdd_order
      SERVER_PORT: 8201
      BASE_URL: ${BASE_URL:-http://localhost:8200}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-please-change-this}
      JWT_EXPIRE_MINUTES: 1440
      GIN_MODE: release
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_CORP_SECRET: ${WECOM_CORP_SECRET:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-0}
      WECOM_TOKEN: ${WECOM_TOKEN:-}
      WECOM_ENCODING_AES_KEY: ${WECOM_ENCODING_AES_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin888}
    volumes:
      - app_uploads:/app/uploads
      - app_data:/app/data
    ports:
      - "8200:8201"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8201/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs

volumes:
  pg_data:
  app_uploads:
  app_data:
  nginx_certs:
